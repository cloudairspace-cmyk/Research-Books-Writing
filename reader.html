<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Reader | Homers Research Consult</title>
  <link rel="stylesheet" href="css/main.css?v=1.3">
  <style>
    /* WhatsApp Chat Styles */
    .comments-panel {
      display: flex !important;
      flex-direction: column;
      background: #efeae2;
      position: relative;
    }
    .comments-panel.hidden {
      display: none !important;
    }
    
    #commentsList {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #efeae2 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png') repeat;
    }
    
    .chat-row {
      display: flex;
      width: 100%;
      margin: 2px 0;
    }
    .chat-row.outgoing { justify-content: flex-end; }
    .chat-row.incoming { justify-content: flex-start; }
    
    .chat-bubble {
      max-width: 85%;
      padding: 8px 12px 6px;
      border-radius: 8px;
      position: relative;
      box-shadow: 0 1px 1.5px rgba(0,0,0,0.12);
      font-size: 0.88rem;
      line-height: 1.4;
      display: flex;
      flex-direction: column;
    }
    .chat-row.outgoing .chat-bubble {
      background: #d9fdd3;
      color: #111b21;
      border-top-right-radius: 0;
    }
    .chat-row.incoming .chat-bubble {
      background: #ffffff;
      color: #111b21;
      border-top-left-radius: 0;
    }
    
    .chat-sender-name {
      font-size: 0.72rem;
      font-weight: 700;
      margin-bottom: 3px;
    }
    .chat-row.outgoing .chat-sender-name { color: #008069; }
    .chat-row.incoming .chat-sender-name { color: var(--blue); }
    
    .chat-quote {
      background: rgba(0, 0, 0, 0.05);
      border-left: 3px solid var(--gold);
      padding: 4px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-style: italic;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .chat-time {
      font-size: 0.65rem;
      color: #667781;
      align-self: flex-end;
      margin-top: 4px;
    }
    
    /* Input Area */
    .chat-input-container {
      background: #f0f2f5;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-input-field {
      flex: 1;
      background: #ffffff;
      border: 1px solid #e1e9eb;
      border-radius: 20px;
      padding: 9px 15px;
      font-size: 0.88rem;
      color: #111b21;
      outline: none;
      font-family: var(--font-body);
    }
    .chat-action-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.25rem;
      color: #54656f;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .chat-action-btn:hover {
      color: #111b21;
      transform: scale(1.05);
    }
    .chat-send-btn {
      background: #008069;
      color: #ffffff;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      transition: var(--transition);
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }
    .chat-send-btn:hover {
      background: #006e5a;
      transform: scale(1.05);
    }

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 768px) {
      /* Navbar */
      .navbar {
        padding: 0 10px;
        height: auto;
        min-height: 50px;
        flex-wrap: wrap;
        gap: 6px;
        padding-top: 8px;
        padding-bottom: 8px;
      }
      .navbar-brand { gap: 8px; }
      .navbar-brand h2 { font-size: 0.82rem !important; }
      .navbar-brand img { width: 26px !important; height: 26px !important; }
      .navbar-actions {
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .navbar-actions .btn-sm { padding: 5px 10px; font-size: 0.72rem; }
      .navbar-actions select { font-size: 0.72rem; padding: 4px 8px !important; }
      .role-badge { font-size: 0.62rem !important; padding: 3px 8px !important; }

      /* Reader layout: stack vertically */
      .reader-layout {
        flex-direction: column;
        height: auto;
        min-height: calc(100vh - 50px);
      }

      /* Chapter sidebar: horizontal scrollable strip */
      .chapter-sidebar {
        width: 100%;
        height: auto;
        max-height: none;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 10px 0;
        overflow-x: auto;
        overflow-y: hidden;
        flex-shrink: 0;
      }
      .chapter-sidebar h3 { font-size: 0.65rem; padding: 0 12px; margin-bottom: 6px; }
      .chapter-list {
        display: flex;
        flex-direction: row;
        overflow-x: auto;
        padding: 0 12px;
        gap: 4px;
        -webkit-overflow-scrolling: touch;
      }
      .chapter-item {
        white-space: nowrap;
        padding: 6px 12px;
        font-size: 0.75rem;
        border-left: none;
        border-bottom: 3px solid transparent;
        flex-shrink: 0;
        border-radius: 6px;
        background: var(--bg-soft);
      }
      .chapter-item.active {
        border-bottom-color: var(--indigo);
        background: var(--indigo-bg);
      }

      /* Main content area */
      .reader-main {
        flex: 1;
        padding: 16px 14px;
        max-width: 100%;
        overflow-y: auto;
        min-height: 300px;
      }
      .reader-main h1 { font-size: 1.3rem; }
      .reader-main h2 { font-size: 1.1rem; margin: 18px 0 10px; }
      .reader-main p { font-size: 0.9rem; line-height: 1.7; }

      /* Chat panel: full-screen overlay on mobile */
      .comments-panel {
        position: fixed !important;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100% !important;
        height: 100% !important;
        z-index: 200;
        border-left: none;
      }

      /* Chat bubbles */
      .chat-bubble { max-width: 90%; font-size: 0.84rem; }
      .chat-input-container { padding: 8px 10px; gap: 8px; }
      .chat-input-field { padding: 8px 12px; font-size: 0.84rem; }
      .chat-send-btn { width: 34px; height: 34px; }

      /* Voice recorder */
      .voice-recorder { bottom: 12px; right: 12px; }
      .voice-btn { width: 42px; height: 42px; font-size: 16px; }
      .voice-panel { width: 250px; padding: 14px; }

      /* Commentable paragraphs */
      .commentable { padding-right: 28px; }
      .comment-trigger { width: 22px; height: 22px; font-size: 10px; }
    }

    @media (max-width: 480px) {
      .navbar-brand h2 { font-size: 0.72rem !important; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .navbar-actions select { max-width: 100px; }
      .reader-main { padding: 12px 10px; }
      .reader-main h1 { font-size: 1.15rem; }
      .reader-main p { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <a href="dashboard.html" style="display:flex;align-items:center;gap:8px;color:#fff;text-decoration:none;">
        <span style="font-size:20px;">←</span>
        <img src="youtube logo.png" alt="HRC" style="width:32px;height:32px;border-radius:50%;object-fit:cover;">
      </a>
      <div>
        <h2 id="bookTitle" style="font-size:1rem;color:#fff;">Loading...</h2>
        <span id="bookStatus" class="badge badge-draft" style="font-size:0.65rem;">Draft</span>
      </div>
    </div>
    <div class="navbar-actions">
      <select id="statusSelect" class="btn btn-sm btn-secondary" style="cursor:pointer;appearance:auto;padding:6px 12px;" onchange="changeStatus(this.value)">
        <option value="draft">📝 Draft</option>
        <option value="in-review">🔍 In Review</option>
        <option value="revision">🔄 Needs Revision</option>
        <option value="approved">✅ Approved</option>
      </select>
      <button class="btn btn-sm btn-secondary" onclick="toggleComments()">💬 Comments</button>
      <button class="btn btn-sm btn-secondary" onclick="showVersions()" style="display:none;">📋 Versions</button>
      <span class="role-badge" id="roleBadge"></span>
    </div>
  </nav>

  <!-- Reader Layout -->
  <div class="reader-layout">

    <!-- Chapter Sidebar -->
    <div class="chapter-sidebar" id="chapterSidebar">
      <h3>Chapters</h3>
      <ul class="chapter-list" id="chapterList"></ul>
    </div>

    <!-- Main Content -->
    <div class="reader-main" id="readerContent">
      <div style="text-align:center;padding:100px 0;color:var(--gray-400);">
        <p style="font-size:3rem;margin-bottom:16px;">📖</p>
        <p>Select a chapter to begin reading</p>
      </div>
    </div>

    <!-- Comments Panel -->
    <div class="comments-panel" id="commentsPanel">
      <div class="comments-header" style="background:#075e54;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:1rem;">💬</div>
          <div>
            <h3 style="font-size:0.88rem;color:#fff;font-family:var(--font-body);margin:0;font-weight:600;">Review Chat</h3>
            <span style="font-size:0.68rem;color:rgba(255,255,255,0.7);display:block;margin-top:1px;">Emma & CEO</span>
          </div>
        </div>
        <button onclick="toggleComments()" style="width:32px;height:32px;font-size:14px;background:none;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>
      
      <div id="commentsList"></div>
      
      <!-- Quote Reply Preview -->
      <div id="replyPreviewBar" style="background:rgba(0,0,0,0.03);border-left:3px solid var(--gold);padding:6px 12px;font-size:0.75rem;display:none;align-items:center;justify-content:space-between;border-top:1px solid var(--border);">
        <div id="replyPreviewText" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;font-style:italic;color:var(--text-secondary);">Replying to paragraph...</div>
        <button onclick="clearReplyQuote()" style="background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-muted);padding-left:8px;">✕</button>
      </div>
      
      <div class="chat-input-container">
        <button class="chat-action-btn" id="voiceCommentBtn" onclick="toggleVoicePanel()" title="Voice note">🎤</button>
        <input type="text" id="commentText" placeholder="Type a message..." class="chat-input-field" onkeydown="handleChatKey(event)">
        <button class="chat-send-btn" onclick="submitComment()" title="Send">✈️</button>
      </div>
    </div>
  </div>

  <!-- Voice Recorder -->
  <div class="voice-recorder" id="voiceRecorder">
    <div class="voice-panel" id="voicePanel">
      <button class="voice-panel-close" onclick="closeVoicePanel()" title="Close">✕</button>
      <h3 style="font-size:0.9rem;margin-bottom:8px;">🎤 Voice Note</h3>
      <div class="voice-timer" id="voiceTimer">00:00</div>
      <div class="voice-controls">
        <button class="btn btn-sm btn-primary" id="recordBtn" onclick="toggleRecording()">Start Recording</button>
        <button class="btn btn-sm btn-secondary" id="stopBtn" onclick="stopAndSave()" style="display:none;">Save</button>
      </div>
      <div id="voiceNotesList" style="margin-top:12px;max-height:150px;overflow-y:auto;"></div>
    </div>
    <button class="voice-btn" id="voiceMainBtn" onclick="toggleVoicePanel()">🎤</button>
  </div>

  <!-- Version Modal -->
  <div class="modal-overlay" id="versionModal">
    <div class="modal">
      <h2>📋 Version History</h2>
      <div id="versionList" class="version-timeline"></div>
      <div class="modal-actions">
        <button class="btn btn-sm btn-secondary" onclick="addVersion()">+ Add Version Note</button>
        <button class="btn btn-sm btn-primary" onclick="closeVersions()">Close</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js?v=1.3"></script>
  <script src="js/db.js?v=1.3"></script>
  <script src="js/books-data.js?v=1.3"></script>
  <script src="js/ceo-feedback-retriever.js?v=1.0"></script>
  <script>
    // ---- Auth ----
    const role = sessionStorage.getItem('hrc_role');
    if (!role || sessionStorage.getItem('hrc_loggedIn') !== 'true') {
      window.location.href = 'index.html';
    }
    const roleBadge = document.getElementById('roleBadge');
    roleBadge.textContent = (role === 'author' || role === 'Emma') ? '✍️ Emma' : '📋 CEO';
    roleBadge.className = 'role-badge ' + ((role === 'author' || role === 'Emma') ? 'role-author' : 'role-reviewer');

    // ---- Get Book ID ----
    const urlParams = new URLSearchParams(window.location.search);
    const bookId = urlParams.get('book');
    if (!bookId) window.location.href = 'dashboard.html';

    let currentChapter = null;
    let bookChapters = [];

    // ---- Load Book ----
    async function loadBook() {
      const books = DB.getBooks().length ? DB.getBooks() : BOOKS_DATA;
      const bookMeta = books.find(b => b.id === bookId);
      if (!bookMeta) { window.location.href = 'dashboard.html'; return; }

      document.getElementById('bookTitle').textContent = bookMeta.title;
      document.title = bookMeta.title + ' | Homers Research Consult';

      const statusClass = bookMeta.status === 'in-review' ? 'review' : bookMeta.status;
      const statusEl = document.getElementById('bookStatus');
      statusEl.textContent = bookMeta.status === 'in-review' ? 'In Review' : bookMeta.status.charAt(0).toUpperCase() + bookMeta.status.slice(1);
      statusEl.className = 'badge badge-' + statusClass;
      document.getElementById('statusSelect').value = bookMeta.status;

      // Try loading book JSON
      try {
        const resp = await fetch(`books/${bookId}.json`);
        if (resp.ok) {
          const data = await resp.json();
          bookChapters = data.chapters || [];
          renderChapterList();
          if (bookChapters.length > 0) selectChapter(0);
        } else {
          showPlaceholder();
        }
      } catch (e) {
        showPlaceholder();
      }
    }

    function showPlaceholder() {
      // Generate placeholder chapters
      const bookMeta = (DB.getBooks().length ? DB.getBooks() : BOOKS_DATA).find(b => b.id === bookId);
      const count = bookMeta ? bookMeta.chapters : 10;
      bookChapters = [];
      for (let i = 0; i < count; i++) {
        bookChapters.push({
          id: `ch-${String(i + 1).padStart(2, '0')}`,
          title: `Chapter ${i + 1}`,
          content: `<p style="color:var(--gray-500);text-align:center;padding:80px 0;">📝 This chapter has not been written yet.<br>Content will appear here once the author publishes it.</p>`
        });
      }
      renderChapterList();
      selectChapter(0);
    }

    // ---- Chapter List ----
    function renderChapterList() {
      const list = document.getElementById('chapterList');
      list.innerHTML = '';
      bookChapters.forEach((ch, i) => {
        const status = DB.getChapterStatus(bookId, ch.id);
        const comments = DB.getComments(bookId, ch.id).filter(c => !c.resolved);
        const li = document.createElement('li');
        li.className = 'chapter-item' + (i === 0 ? ' active' : '');
        li.onclick = () => selectChapter(i);
        li.innerHTML = `
          <span class="ch-status ${status}"></span>
          <span style="flex:1">${ch.title}</span>
          ${comments.length > 0 ? `<span style="font-size:0.7rem;color:var(--orange);">${comments.length}</span>` : ''}
        `;
        list.appendChild(li);
      });
    }

    // ---- Select Chapter ----
    function selectChapter(index) {
      currentChapter = index;
      const ch = bookChapters[index];

      // Update active state
      document.querySelectorAll('.chapter-item').forEach((el, i) => {
        el.className = 'chapter-item' + (i === index ? ' active' : '');
      });

      // Render content with commentable paragraphs
      const content = document.getElementById('readerContent');
      let html = ch.content;

      // Wrap paragraphs in commentable divs
      const wrapper = document.createElement('div');
      wrapper.innerHTML = html;
      let finalHtml = '';
      let pIndex = 0;

      wrapper.childNodes.forEach(node => {
        if (node.nodeType === 1) {
          const tag = node.tagName.toLowerCase();
          if (['p', 'blockquote', 'ul', 'ol', 'table'].includes(tag)) {
            const comments = DB.getComments(bookId, ch.id).filter(c => c.paragraphIndex === pIndex && !c.resolved);
            const hasComments = comments.length > 0;
            finalHtml += `<div class="commentable ${hasComments ? 'has-comments' : ''}" data-p="${pIndex}">
              ${node.outerHTML}
              <button class="comment-trigger" onclick="openCommentFor(${pIndex})" title="Add comment">
                💬
                ${hasComments ? `<span class="comment-count-badge">${comments.length}</span>` : ''}
              </button>
            </div>`;
            pIndex++;
          } else {
            finalHtml += node.outerHTML;
          }
        }
      });

      content.innerHTML = finalHtml || html;
      content.scrollTop = 0;
      loadComments();
      loadVoiceNotes();
    }

    // ---- Comments ----
    function loadComments() {
      if (!bookChapters[currentChapter]) return;
      const ch = bookChapters[currentChapter];
      const comments = DB.getComments(bookId, ch.id);
      const voiceNotes = DB.getVoiceNotes(bookId, ch.id).map(vn => ({ ...vn, isVoice: true }));
      const allItems = [...comments, ...voiceNotes].sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

      const list = document.getElementById('commentsList');
      if (allItems.length === 0) {
        list.innerHTML = '<p style="padding:40px 20px;text-align:center;color:var(--gray-500);font-size:0.85rem;background:transparent;">No messages on this chapter yet. Send a message or click a paragraph 💬 icon to reference it.</p>';
        return;
      }

      list.innerHTML = allItems.map(item => {
        const isOutgoing = item.role === role;
        const senderName = (item.role === 'reviewer' || item.role === 'CEO') ? 'CEO' : 'Emma';
        
        let contentHtml = '';
        if (item.isVoice) {
          contentHtml = `
            <div style="margin-top:4px;">
              <audio controls src="${item.audioData}" style="width:100%;height:32px;border-radius:4px;outline:none;"></audio>
            </div>
          `;
        } else {
          contentHtml = `<p style="margin:2px 0 0;font-size:0.86rem;word-break:break-word;">${escapeHtml(item.text)}</p>`;
        }
        
        const quoteHtml = item.paragraphText 
          ? `<div class="chat-quote" title="${escapeHtml(item.paragraphText)}">"${escapeHtml(item.paragraphText.substring(0, 50))}..."</div>`
          : '';

        return `
          <div class="chat-row ${isOutgoing ? 'outgoing' : 'incoming'}">
            <div class="chat-bubble">
              <span class="chat-sender-name">${senderName}</span>
              ${quoteHtml}
              ${contentHtml}
              <span class="chat-time">${formatDate(item.timestamp)}</span>
            </div>
          </div>
        `;
      }).join('');

      // Auto scroll to bottom
      setTimeout(() => {
        list.scrollTop = list.scrollHeight;
      }, 50);
    }

    function openCommentFor(pIndex) {
      const panel = document.getElementById('commentsPanel');
      panel.classList.remove('hidden');
      
      const textEl = document.getElementById('commentText');
      textEl.focus();
      textEl.dataset.paragraphIndex = pIndex;

      const commentable = document.querySelector(`[data-p="${pIndex}"]`);
      if (commentable) {
        const text = commentable.textContent.trim();
        textEl.dataset.paragraphText = text;
        
        document.getElementById('replyPreviewText').textContent = `Reply to: "${text.substring(0, 45)}..."`;
        document.getElementById('replyPreviewBar').style.display = 'flex';
      }
    }

    function clearReplyQuote() {
      const textEl = document.getElementById('commentText');
      textEl.dataset.paragraphIndex = '';
      textEl.dataset.paragraphText = '';
      document.getElementById('replyPreviewBar').style.display = 'none';
    }

    function handleChatKey(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitComment();
      }
    }

    function submitComment() {
      const textEl = document.getElementById('commentText');
      const text = textEl.value.trim();
      if (!text) return;

      const ch = bookChapters[currentChapter];
      DB.addComment(bookId, ch.id, {
        text,
        role,
        paragraphIndex: textEl.dataset.paragraphIndex ? parseInt(textEl.dataset.paragraphIndex) : null,
        paragraphText: textEl.dataset.paragraphText || '',
        resolved: false
      });

      textEl.value = '';
      clearReplyQuote();
      selectChapter(currentChapter);
      showToast('Message sent', 'success');
    }

    function resolveComment(commentId) {
      const ch = bookChapters[currentChapter];
      DB.resolveComment(bookId, ch.id, commentId);
      selectChapter(currentChapter);
      showToast('Comment resolved', 'success');
    }

    function replyToComment(commentId) {
      const replyText = prompt('Your reply:');
      if (!replyText) return;
      const ch = bookChapters[currentChapter];
      DB.addReply(bookId, ch.id, commentId, { text: replyText, role });
      loadComments();
      showToast('Reply posted', 'success');
    }

    function toggleComments() {
      const panel = document.getElementById('commentsPanel');
      panel.classList.toggle('hidden');
      // On mobile, prevent body scroll when chat is open
      if (!panel.classList.contains('hidden')) {
        document.body.style.overflow = 'hidden';
      } else {
        document.body.style.overflow = '';
      }
    }

    // ---- Status ----
    function changeStatus(newStatus) {
      DB.updateBookStatus(bookId, newStatus);
      const statusClass = newStatus === 'in-review' ? 'review' : newStatus;
      const statusEl = document.getElementById('bookStatus');
      statusEl.textContent = newStatus === 'in-review' ? 'In Review' : newStatus.charAt(0).toUpperCase() + newStatus.slice(1);
      statusEl.className = 'badge badge-' + statusClass;
      showToast('Status updated to ' + newStatus, 'success');
    }

    // ---- Versions ----
    function showVersions() {
      document.getElementById('versionModal').classList.add('show');
      const versions = DB.getVersions(bookId);
      const list = document.getElementById('versionList');
      if (versions.length === 0) {
        list.innerHTML = '<p style="color:var(--gray-500);text-align:center;padding:20px;">No versions recorded yet.</p>';
        return;
      }
      list.innerHTML = versions.map(v => `
        <div class="version-item">
          <div class="version-dot"></div>
          <div class="version-info">
            <h4>Version ${v.number}</h4>
            <p>${v.notes || 'No notes'}</p>
            <p style="font-size:0.72rem;color:var(--gray-500);">${formatDate(v.timestamp)}</p>
          </div>
        </div>
      `).join('');
    }

    function addVersion() {
      const notes = prompt('Version notes (what changed?):');
      if (!notes) return;
      DB.addVersion(bookId, { notes });
      showVersions();
      showToast('Version recorded', 'success');
    }

    function closeVersions() {
      document.getElementById('versionModal').classList.remove('show');
    }

    // ---- Voice Recording ----
    let mediaRecorder = null;
    let audioChunks = [];
    let recordingTimer = null;
    let recordingSeconds = 0;

    function toggleVoicePanel() {
      document.getElementById('voicePanel').classList.toggle('show');
    }

    function closeVoicePanel() {
      document.getElementById('voicePanel').classList.remove('show');
    }

    async function toggleRecording() {
      const btn = document.getElementById('recordBtn');
      const stopBtn = document.getElementById('stopBtn');
      const mainBtn = document.getElementById('voiceMainBtn');

      if (!mediaRecorder || mediaRecorder.state === 'inactive') {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
          mediaRecorder.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            clearInterval(recordingTimer);
          };

          mediaRecorder.start();
          recordingSeconds = 0;
          recordingTimer = setInterval(() => {
            recordingSeconds++;
            const m = String(Math.floor(recordingSeconds / 60)).padStart(2, '0');
            const s = String(recordingSeconds % 60).padStart(2, '0');
            document.getElementById('voiceTimer').textContent = m + ':' + s;
          }, 1000);

          btn.textContent = '⏸ Pause';
          btn.style.background = 'var(--red)';
          btn.style.color = 'white';
          stopBtn.style.display = 'inline-flex';
          mainBtn.classList.add('recording');
        } catch (e) {
          showToast('Microphone access denied', 'error');
        }
      } else if (mediaRecorder.state === 'recording') {
        mediaRecorder.pause();
        btn.textContent = '▶ Resume';
        btn.style.background = '';
        btn.style.color = '';
        clearInterval(recordingTimer);
      } else if (mediaRecorder.state === 'paused') {
        mediaRecorder.resume();
        btn.textContent = '⏸ Pause';
        btn.style.background = 'var(--red)';
        btn.style.color = 'white';
        recordingTimer = setInterval(() => {
          recordingSeconds++;
          const m = String(Math.floor(recordingSeconds / 60)).padStart(2, '0');
          const s = String(recordingSeconds % 60).padStart(2, '0');
          document.getElementById('voiceTimer').textContent = m + ':' + s;
        }, 1000);
      }
    }

    function stopAndSave() {
      if (!mediaRecorder || mediaRecorder.state === 'inactive') return;

      mediaRecorder.stop();
      document.getElementById('voiceMainBtn').classList.remove('recording');

      setTimeout(() => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const url = URL.createObjectURL(blob);
        const ch = bookChapters[currentChapter];

        // Convert to base64 for storage
        const reader = new FileReader();
        reader.onload = () => {
          DB.addVoiceNote(bookId, ch.id, {
            audioData: reader.result,
            duration: recordingSeconds,
            role
          });
          loadVoiceNotes();
          loadComments();
          showToast('Voice note saved', 'success');
        };
        reader.readAsDataURL(blob);

        // Reset UI and close panel
        document.getElementById('recordBtn').textContent = 'Start Recording';
        document.getElementById('recordBtn').style.background = '';
        document.getElementById('recordBtn').style.color = '';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('voiceTimer').textContent = '00:00';
        recordingSeconds = 0;

        // Auto-close voice panel after saving
        setTimeout(() => closeVoicePanel(), 1500);
      }, 200);
    }

    function loadVoiceNotes() {
      if (!bookChapters[currentChapter]) return;
      const ch = bookChapters[currentChapter];
      const notes = DB.getVoiceNotes(bookId, ch.id);
      const list = document.getElementById('voiceNotesList');

      list.innerHTML = notes.map(n => `
        <div class="voice-note-item">
          <span style="font-size:0.75rem;color:${(n.role === 'reviewer' || n.role === 'CEO') ? 'var(--blue)' : 'var(--gold)'};">
            ${(n.role === 'reviewer' || n.role === 'CEO') ? '📋 CEO' : '✍️ Emma'}
          </span>
          <audio controls src="${n.audioData}" style="flex:1;height:32px;"></audio>
          <span style="font-size:0.7rem;color:var(--gray-500);">${Math.floor(n.duration / 60)}:${String(n.duration % 60).padStart(2, '0')}</span>
        </div>
      `).join('');
    }

    // ---- Utilities ----
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function showToast(msg, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast toast-' + type;
      toast.textContent = msg;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ---- Init ----
    loadBook();

    // Real-time synchronization callback
    DB.onUpdate = (type) => {
      if (type === 'comments') {
        if (typeof loadComments === 'function') loadComments();
        if (typeof renderChapterList === 'function') renderChapterList();
      } else if (type === 'voicenotes') {
        if (typeof loadVoiceNotes === 'function') loadVoiceNotes();
        if (typeof loadComments === 'function') loadComments();
      } else if (type === 'chapterStatus') {
        if (typeof renderChapterList === 'function') renderChapterList();
      } else if (type === 'books') {
        const books = DB.getBooks();
        const bookMeta = books.find(b => b.id === bookId);
        if (bookMeta) {
          const statusClass = bookMeta.status === 'in-review' ? 'review' : bookMeta.status;
          const statusEl = document.getElementById('bookStatus');
          if (statusEl) {
            statusEl.textContent = bookMeta.status === 'in-review' ? 'In Review' : bookMeta.status.charAt(0).toUpperCase() + bookMeta.status.slice(1);
            statusEl.className = 'badge badge-' + statusClass;
          }
          const selectEl = document.getElementById('statusSelect');
          if (selectEl) selectEl.value = bookMeta.status;
        }
      } else if (type === 'versions') {
        const modal = document.getElementById('versionModal');
        if (modal && modal.classList.contains('show') && typeof showVersions === 'function') {
          showVersions();
        }
      }
    };
  </script>
</body>
</html>
