<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Homers Research Consult - Book Review Platform">
  <title>Homers Research Consult | Book Review Platform</title>
  <link rel="stylesheet" href="css/main.css?v=1.3">
</head>
<body>
  <div class="login-page">
    <div class="login-card glass">
      <img src="youtube logo.png" alt="Homer's Research Consult" style="width:72px;height:72px;margin:0 auto 18px;display:block;border-radius:50%;object-fit:cover;">
      <h1>Homers Research Consult</h1>
      <p class="subtitle">Book Review Platform</p>
      
      <form id="loginForm" onsubmit="return false;">
        <div class="input-group">
          <label for="password">Enter your access password</label>
          <input type="password" id="password" placeholder="••••••••••" autocomplete="off" autofocus>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        <p class="login-error" id="loginError">Invalid password. Please try again.</p>
      </form>
    </div>
  </div>

  <script>
    // Secure auth with SHA-256 hashed passwords
    // No plain-text passwords in source code
    const CREDENTIALS = {
      '187f5bf883179d57fe1671ab493ddc1d3c3f11cba7a2176360c33559452b6fa4': 'Emma',
      'dcb71b90feb69f0c93f53e3950a7c42a01e3dacdea463007ee0f326a51d6dcdc': 'CEO'
    };

    async function hashPassword(password) {
      const encoder = new TextEncoder();
      const data = encoder.encode(password);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('loginForm').addEventListener('submit', async function() {
      const pw = document.getElementById('password').value.trim();
      const hash = await hashPassword(pw);
      const role = CREDENTIALS[hash];
      if (role) {
        sessionStorage.setItem('hrc_role', role);
        sessionStorage.setItem('hrc_loggedIn', 'true');
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('loginError').classList.add('show');
        document.getElementById('password').value = '';
        setTimeout(() => document.getElementById('loginError').classList.remove('show'), 3000);
      }
    });

    // Redirect if already logged in
    if (sessionStorage.getItem('hrc_loggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
